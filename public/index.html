<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales Research Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="chat">
      <header class="chat__header">
        <h1 class="chat__title">Sales Research Assistant</h1>
        <p class="chat__subtitle">Company lookup · company research · email validation</p>
      </header>

      <ol id="messages" class="chat__log" aria-live="polite" aria-label="Conversation"></ol>

      <form id="composer" class="composer" autocomplete="off">
        <input
          id="input"
          class="composer__input"
          name="message"
          placeholder="e.g. Look up acme.com, research them, and validate john@acme.com"
          aria-label="Message"
        />
        <button id="send" class="composer__button" type="submit">Send</button>
      </form>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
